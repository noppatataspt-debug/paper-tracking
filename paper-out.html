<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📤 Paper-Out · Asia Paper Tube</title>
<style>
:root {
  --primary: #dc2626;
  --primary-dark: #991b1b;
  --primary-light: #fee2e2;
  --success: #059669;
  --success-light: #d1fae5;
  --warning: #d97706;
  --warning-light: #fef3c7;
  --info: #2563eb;
  --text: #1f2937;
  --text-dim: #6b7280;
  --text-muted: #9ca3af;
  --border: #e5e7eb;
  --border-strong: #d1d5db;
  --bg: #f9fafb;
  --panel: #ffffff;
  --mono: ui-monospace, 'SF Mono', Consolas, monospace;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}
.container { max-width: 800px; margin: 0 auto; padding: 12px; }

.header {
  background: var(--panel);
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}
.header h1 { margin: 0; font-size: 22px; font-weight: 700; color: var(--primary); }
.header-nav { display: flex; gap: 8px; flex-wrap: wrap; }
.nav-btn {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-dim); padding: 7px 14px; border-radius: 8px;
  text-decoration: none; font-size: 13px; font-weight: 600;
  transition: all 0.15s;
}
.nav-btn:hover { background: white; color: var(--text); border-color: var(--border-strong); }

.tabs {
  display: flex; gap: 4px; margin-bottom: 12px;
  background: var(--panel); padding: 4px; border-radius: 10px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1; padding: 10px 12px; border: none; background: transparent;
  border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer;
  color: var(--text-dim); transition: all 0.15s;
}
.tab:hover { background: var(--bg); }
.tab.active { background: var(--primary); color: white; }

.section { display: none; }
.section.active { display: block; }

.card {
  background: var(--panel); border-radius: 14px;
  padding: 18px; margin-bottom: 12px; border: 1px solid var(--border);
}

.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--text-dim); margin-bottom: 6px;
}
.form-label.required::after { content: ' *'; color: var(--primary); }
.form-input, .form-select {
  width: 100%; padding: 11px 13px;
  border: 1.5px solid var(--border-strong); border-radius: 8px;
  font-size: 15px; font-family: inherit; background: white;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-input:focus, .form-select:focus {
  outline: none; border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
.form-input.lot {
  font-family: var(--mono); font-size: 18px;
  font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
}

.lot-input-wrap { display: flex; gap: 8px; }
.lot-input-wrap .form-input { flex: 1; }
.scan-btn {
  background: var(--info); color: white; border: none;
  border-radius: 8px; padding: 0 18px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: background 0.15s;
}
.scan-btn:hover { background: #1e40af; }
.scan-btn:active { transform: scale(0.97); }

.lookup-box {
  border-radius: 10px; padding: 14px;
  margin-bottom: 14px; display: none;
}
.lookup-box.show { display: block; }
.lookup-box.found { background: var(--success-light); border: 1.5px solid var(--success); }
.lookup-box.found-used { background: var(--warning-light); border: 1.5px solid var(--warning); }
.lookup-box.notfound { background: var(--primary-light); border: 1.5px solid var(--primary); }
.lookup-status {
  font-weight: 700; font-size: 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.lookup-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 6px 14px; font-size: 13px;
}
.lookup-grid > div { display: flex; gap: 6px; }
.lookup-grid label { color: var(--text-dim); font-weight: 500; }
.lookup-grid span { font-weight: 700; color: var(--text); }
.lookup-actions {
  display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
}
.lookup-actions button {
  flex: 1; min-width: 100px; padding: 9px 12px;
  border-radius: 7px; border: 1.5px solid;
  font-size: 13px; font-weight: 600; cursor: pointer; background: white;
}
.btn-warn { border-color: var(--warning); color: var(--warning); }
.btn-warn:hover { background: var(--warning); color: white; }
.btn-secondary { border-color: var(--border-strong); color: var(--text-dim); }
.btn-secondary:hover { background: var(--bg); }

.btn-submit {
  width: 100%; background: var(--primary); color: white;
  border: none; padding: 18px; border-radius: 10px;
  font-size: 18px; font-weight: 700; cursor: pointer;
  margin-top: 8px; transition: background 0.15s, transform 0.1s;
}
.btn-submit:hover:not(:disabled) { background: var(--primary-dark); }
.btn-submit:active:not(:disabled) { transform: scale(0.99); }
.btn-submit:disabled { background: var(--border-strong); cursor: not-allowed; }

.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 12px 20px; border-radius: 10px; font-weight: 600;
  z-index: 9999; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  animation: slideDown 0.3s; max-width: 90vw; text-align: center;
}
.toast.success { background: var(--success); color: white; }
.toast.error { background: var(--primary); color: white; }
.toast.warn { background: var(--warning); color: white; }
@keyframes slideDown {
  from { transform: translate(-50%, -100%); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}

.list-stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; margin-bottom: 12px;
}
.stat {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 8px; text-align: center;
}
.stat-value { font-size: 20px; font-weight: 800; color: var(--text); }
.stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; font-weight: 600; }
@media (max-width: 500px) { .list-stats { grid-template-columns: repeat(2, 1fr); } }

.list-controls {
  display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
}
.list-controls input, .list-controls select {
  padding: 8px 10px; border: 1px solid var(--border-strong);
  border-radius: 7px; font-size: 13px; background: white;
}
.list-controls input { flex: 1; min-width: 150px; }
.list-controls button {
  padding: 8px 14px; background: var(--info); color: white;
  border: none; border-radius: 7px; font-size: 13px;
  font-weight: 600; cursor: pointer;
}
.list-controls button:hover { background: #1e40af; }

.outflow-list {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
}
.outflow-row {
  display: grid; grid-template-columns: 130px 130px 1fr auto;
  gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--border);
  align-items: center; font-size: 13px; transition: background 0.15s;
}
.outflow-row:last-child { border-bottom: none; }
.outflow-row:hover { background: var(--bg); }
.outflow-row.voided { opacity: 0.5; text-decoration: line-through; }
.outflow-date { color: var(--text-dim); font-size: 12px; }
.outflow-lot { font-family: var(--mono); font-weight: 700; font-size: 14px; }
.outflow-info { font-size: 12px; color: var(--text-dim); }
.outflow-info b { color: var(--text); font-weight: 600; }
.outflow-undo {
  background: none; border: 1px solid var(--border-strong);
  color: var(--text-dim); padding: 4px 10px; border-radius: 6px;
  font-size: 12px; cursor: pointer; font-weight: 600;
}
.outflow-undo:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

@media (max-width: 700px) {
  .outflow-row { grid-template-columns: 1fr auto; gap: 4px; padding: 12px; }
  .outflow-row > div:nth-child(1) { grid-column: 1; }
  .outflow-row > div:nth-child(2) { grid-column: 1; grid-row: 2; font-size: 15px; }
  .outflow-row > div:nth-child(3) { grid-column: 1 / -1; grid-row: 3; }
  .outflow-row > div:nth-child(4) { grid-column: 2; grid-row: 1 / 3; align-self: center; }
}

.empty-state { padding: 40px 20px; text-align: center; color: var(--text-dim); }
.empty-state .icon { font-size: 36px; margin-bottom: 8px; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center;
  z-index: 1000; padding: 16px;
}
.modal-overlay.show { display: flex; }
.scanner-modal {
  background: black; width: 100%; max-width: 500px;
  border-radius: 14px; overflow: hidden; position: relative;
}
.scanner-video { width: 100%; display: block; background: #000; }
.scanner-close {
  position: absolute; top: 10px; right: 10px;
  background: rgba(255,255,255,0.9); border: none;
  width: 36px; height: 36px; border-radius: 50%;
  font-size: 18px; cursor: pointer; z-index: 10;
}
.scanner-hint {
  position: absolute; bottom: 16px; left: 16px; right: 16px;
  background: rgba(0,0,0,0.7); color: white; padding: 10px;
  border-radius: 8px; text-align: center; font-size: 13px; font-weight: 600;
}

.loading {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border); border-top-color: var(--primary);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>📤 Paper-Out</h1>
    <div class="header-nav">
      <a href="/" class="nav-btn">🏠 Home</a>
      <a href="/paper-in.html" class="nav-btn">📥 Paper-In</a>
      <a href="/dashboard.html" class="nav-btn">📊 Dashboard</a>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="form">✂️ ตัดออก</button>
    <button class="tab" data-tab="list">📋 รายการ <span id="tabBadge"></span></button>
  </div>

  <div id="section-form" class="section active">
    <div class="card">
      <div class="form-group">
        <label class="form-label required">วันที่ตัดออก</label>
        <input type="date" id="outflowDate" class="form-input">
      </div>

      <div class="form-group">
        <label class="form-label required">เลข Paper Lot</label>
        <div class="lot-input-wrap">
          <input type="text" id="lotInput" class="form-input lot" 
                 placeholder="พิมพ์หรือ scan QR..." autocomplete="off">
          <button class="scan-btn" id="btnScan">📷 Scan</button>
        </div>
      </div>

      <div id="lookupBox" class="lookup-box"></div>

      <button id="btnSubmit" class="btn-submit" disabled>✓ ตัดออกจาก Stock</button>
    </div>
  </div>

  <div id="section-list" class="section">
    <div class="list-stats">
      <div class="stat">
        <div class="stat-value" id="statToday">0</div>
        <div class="stat-label">วันนี้ (ม้วน)</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statTodayKg">0</div>
        <div class="stat-label">วันนี้ (kg)</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statMonth">0</div>
        <div class="stat-label">เดือนนี้ (ม้วน)</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statMonthKg">0</div>
        <div class="stat-label">เดือนนี้ (kg)</div>
      </div>
    </div>

    <div class="list-controls">
      <input type="text" id="searchInput" placeholder="🔍 ค้นหา lot...">
      <select id="filterPeriod">
        <option value="today">วันนี้</option>
        <option value="week">7 วัน</option>
        <option value="month" selected>เดือนนี้</option>
        <option value="all">ทั้งหมด</option>
      </select>
      <button id="btnExport">📥 Export CSV</button>
    </div>

    <div class="outflow-list" id="outflowList">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <div>กำลังโหลด...</div>
      </div>
    </div>
  </div>

</div>

<div class="modal-overlay" id="modalScanner">
  <div class="scanner-modal">
    <button class="scanner-close" onclick="stopScanner()">×</button>
    <video id="scannerVideo" class="scanner-video" autoplay muted playsinline></video>
    <div class="scanner-hint">📷 หันกล้องเข้าหา QR Code</div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import jsQR from 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/+esm';

const SUPABASE_URL = 'https://lfrwghrlxaordpxrqyij.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmcndnaHJseGFvcmRweHJxeWlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MzQ5MjgsImV4cCI6MjA5MjQxMDkyOH0.M13hI5TUqEL8iVmGM3pWcjbyULSx_n7VPgI2TcHnNZA';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentLot = null;
let currentInvoice = null;
let isPreStock = false;
let allOutflows = [];

function normalize(lot) {
  return (lot || '').toUpperCase().replace(/-/g, '').trim();
}

function showToast(message, type = 'success') {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = message;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('th-TH', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function fmtDateTime(d) {
  if (!d) return '-';
  return new Date(d).toLocaleString('th-TH', { 
    day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' 
  });
}

document.getElementById('outflowDate').value = new Date().toISOString().split('T')[0];

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('section-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'list') loadOutflows();
  });
});

const lotInput = document.getElementById('lotInput');
let lookupTimer = null;

lotInput.addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase();
  clearTimeout(lookupTimer);
  const lot = normalize(e.target.value);
  if (lot.length < 3) { clearLookup(); return; }
  lookupTimer = setTimeout(() => doLookup(lot), 400);
});

lotInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    clearTimeout(lookupTimer);
    doLookup(normalize(e.target.value));
  }
});

async function doLookup(normLot) {
  if (!normLot) return;
  
  const box = document.getElementById('lookupBox');
  box.className = 'lookup-box show';
  box.innerHTML = '<div class="lookup-status"><span class="loading"></span> กำลังค้นหา...</div>';
  
  try {
    const { data, error } = await supabase
      .from('paper_invoices')
      .select('id, paper_lot, paper_lot_normalized, paper_type, supplier, width_mm, weight_kg, status, remaining_weight_kg, invoice_no, receive_date')
      .eq('paper_lot_normalized', normLot)
      .maybeSingle();
    
    if (error) throw error;
    
    if (data) {
      currentLot = normLot;
      currentInvoice = data;
      isPreStock = false;
      
      const isUsed = data.status === 'used';
      box.className = `lookup-box show ${isUsed ? 'found-used' : 'found'}`;
      box.innerHTML = `
        <div class="lookup-status">
          ${isUsed ? '⚠️ พบในคลัง · status: <b>USED</b> (ใช้ไปแล้ว)' : '✅ พบในคลัง · status: <b>IN_STOCK</b>'}
        </div>
        <div class="lookup-grid">
          <div><label>Supplier:</label> <span>${escapeHtml(data.supplier || '-')}</span></div>
          <div><label>ประเภท:</label> <span>${escapeHtml(data.paper_type || '-')}</span></div>
          <div><label>หน้ากว้าง:</label> <span>${data.width_mm || '-'} mm</span></div>
          <div><label>น้ำหนัก:</label> <span>${data.weight_kg || '-'} kg</span></div>
          <div><label>Invoice:</label> <span>${escapeHtml(data.invoice_no || '-')}</span></div>
          <div><label>วันรับเข้า:</label> <span>${fmtDate(data.receive_date)}</span></div>
        </div>
      `;
      updateSubmitState();
    } else {
      currentLot = null;
      currentInvoice = null;
      box.className = 'lookup-box show notfound';
      box.innerHTML = `
        <div class="lookup-status">❌ ไม่พบ lot นี้ในคลัง</div>
        <div style="font-size:13px;color:var(--text-dim);">Lot <b style="font-family:var(--mono);">${escapeHtml(lotInput.value)}</b> ยังไม่มีใน paper_invoices</div>
        <div class="lookup-actions">
          <button class="btn-warn" onclick="window.confirmPreStock('${escapeHtml(normLot)}')">📦 ตัดต่อ (pre-stock)</button>
          <button class="btn-secondary" onclick="window.clearLot()">↩ แก้ไขเลข lot</button>
        </div>
      `;
      updateSubmitState();
    }
  } catch (err) {
    console.error('Lookup error:', err);
    box.className = 'lookup-box show notfound';
    box.innerHTML = `<div class="lookup-status">❌ เกิดข้อผิดพลาด: ${escapeHtml(err.message)}</div>`;
  }
}

window.confirmPreStock = function(normLot) {
  currentLot = normLot;
  currentInvoice = null;
  isPreStock = true;
  
  const box = document.getElementById('lookupBox');
  box.className = 'lookup-box show found-used';
  box.innerHTML = `
    <div class="lookup-status">📦 ตัดต่อแบบ pre-stock</div>
    <div style="font-size:13px;color:var(--text-dim);">Lot <b style="font-family:var(--mono);">${escapeHtml(normLot)}</b> จะถูกบันทึกเป็น "pre_stock" — รอข้อมูลรับเข้าจากหัวหน้า</div>
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;">
      ⚠️ กรุณาแจ้งหัวหน้าให้ลงข้อมูลรับเข้าคลังโดยเร็วที่สุด
    </div>
  `;
  updateSubmitState();
};

window.clearLot = function() {
  document.getElementById('lotInput').value = '';
  clearLookup();
  document.getElementById('lotInput').focus();
};

function clearLookup() {
  currentLot = null;
  currentInvoice = null;
  isPreStock = false;
  document.getElementById('lookupBox').className = 'lookup-box';
  document.getElementById('lookupBox').innerHTML = '';
  updateSubmitState();
}

function updateSubmitState() {
  const btn = document.getElementById('btnSubmit');
  btn.disabled = !currentLot;
  btn.textContent = isPreStock ? '📦 บันทึก Pre-stock' : '✓ ตัดออกจาก Stock';
}

document.getElementById('btnSubmit').addEventListener('click', async () => {
  const btn = document.getElementById('btnSubmit');
  if (btn.disabled) return;
  
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> กำลังบันทึก...';
  
  const date = document.getElementById('outflowDate').value;
  const lotRaw = document.getElementById('lotInput').value.trim().toUpperCase();
  
  // Default reason = sale (เพราะ use case ส่วนใหญ่คือขายออก)
  const payload = {
    paper_lot: lotRaw,
    outflow_date: date,
    outflow_reason: isPreStock ? 'pre_stock' : 'sale',
    source: 'paper-out'
  };
  
  if (currentInvoice) {
    payload.paper_invoice_id = currentInvoice.id;
    payload.supplier_name = currentInvoice.supplier;
    payload.paper_type = currentInvoice.paper_type;
    payload.width_mm = currentInvoice.width_mm ? parseInt(currentInvoice.width_mm) : null;
    payload.weight_kg = currentInvoice.weight_kg;
  }
  
  try {
    const { error } = await supabase
      .from('paper_outflows')
      .insert(payload);
    
    if (error) throw error;
    
    showToast(isPreStock ? '✓ บันทึก pre-stock สำเร็จ' : '✓ ตัดออกจาก stock สำเร็จ', 'success');
    
    document.getElementById('lotInput').value = '';
    clearLookup();
    document.getElementById('lotInput').focus();
    
    loadTabBadge();
    
  } catch (err) {
    console.error('Insert error:', err);
    showToast('❌ บันทึกไม่สำเร็จ: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    updateSubmitState();
  }
});

async function loadOutflows() {
  const list = document.getElementById('outflowList');
  list.innerHTML = '<div class="empty-state"><span class="loading"></span><div style="margin-top:8px;">กำลังโหลด...</div></div>';
  
  const period = document.getElementById('filterPeriod').value;
  let query = supabase
    .from('paper_outflows')
    .select('*')
    .order('created_at', { ascending: false });
  
  if (period !== 'all') {
    const now = new Date();
    let from;
    if (period === 'today') from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    else if (period === 'week') from = new Date(now.getTime() - 7*24*60*60*1000);
    else if (period === 'month') from = new Date(now.getFullYear(), now.getMonth(), 1);
    if (from) query = query.gte('outflow_date', from.toISOString().split('T')[0]);
  }
  
  const { data, error } = await query;
  if (error) {
    list.innerHTML = `<div class="empty-state">❌ ${escapeHtml(error.message)}</div>`;
    return;
  }
  
  allOutflows = data || [];
  renderList();
  renderStats();
}

function renderList() {
  const search = document.getElementById('searchInput').value.trim().toUpperCase();
  let filtered = allOutflows;
  if (search) {
    filtered = filtered.filter(o => 
      (o.paper_lot_normalized || '').includes(normalize(search))
    );
  }
  
  const list = document.getElementById('outflowList');
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>ไม่พบรายการ</div></div>';
    return;
  }
  
  list.innerHTML = filtered.map(o => `
    <div class="outflow-row ${o.voided ? 'voided' : ''}">
      <div class="outflow-date">${fmtDateTime(o.created_at)}</div>
      <div class="outflow-lot">${escapeHtml(o.paper_lot)}</div>
      <div class="outflow-info">
        ${o.supplier_name ? `<b>${escapeHtml(o.supplier_name)}</b>` : ''}
        ${o.paper_type ? ` · ${escapeHtml(o.paper_type)}` : ''}
        ${o.width_mm ? ` · ${o.width_mm}mm` : ''}
        ${o.weight_kg ? ` · ${o.weight_kg}kg` : ''}
        ${o.outflow_reason === 'pre_stock' ? '<br><span style="color:var(--warning);font-weight:600;">📦 PRE-STOCK</span>' : ''}
      </div>
      <div>
        ${o.voided 
          ? `<span style="color:var(--text-muted);font-size:11px;">VOIDED</span>` 
          : `<button class="outflow-undo" onclick="window.voidOutflow('${o.id}', '${escapeHtml(o.paper_lot)}')">↩ Undo</button>`}
      </div>
    </div>
  `).join('');
}

function renderStats() {
  const today = new Date().toISOString().split('T')[0];
  const monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
  
  const todayList = allOutflows.filter(o => !o.voided && o.outflow_date === today);
  const monthList = allOutflows.filter(o => !o.voided && o.outflow_date >= monthStart);
  
  document.getElementById('statToday').textContent = todayList.length;
  document.getElementById('statTodayKg').textContent = Math.round(todayList.reduce((s, o) => s + (Number(o.weight_kg) || 0), 0));
  document.getElementById('statMonth').textContent = monthList.length;
  document.getElementById('statMonthKg').textContent = Math.round(monthList.reduce((s, o) => s + (Number(o.weight_kg) || 0), 0));
}

window.voidOutflow = async function(id, lot) {
  if (!confirm(`ยืนยันยกเลิกการตัดออกของ ${lot}?\n\nระบบจะคืน status เป็น in_stock อัตโนมัติ`)) return;
  
  try {
    const { error } = await supabase
      .from('paper_outflows')
      .update({ 
        voided: true, 
        voided_at: new Date().toISOString(), 
        voided_reason: 'แก้ไขข้อมูลผิด'
      })
      .eq('id', id);
    
    if (error) throw error;
    showToast('✓ ยกเลิกสำเร็จ — lot กลับเป็น in_stock', 'success');
    loadOutflows();
    loadTabBadge();
  } catch (err) {
    showToast('❌ ' + err.message, 'error');
  }
};

document.getElementById('searchInput').addEventListener('input', renderList);
document.getElementById('filterPeriod').addEventListener('change', loadOutflows);

document.getElementById('btnExport').addEventListener('click', () => {
  const rows = [
    ['วันที่ตัดออก', 'เวลาบันทึก', 'Paper Lot', 'Supplier', 'ประเภท', 'หน้ากว้าง', 'น้ำหนัก', 'สถานะ']
  ];
  allOutflows.forEach(o => {
    rows.push([
      o.outflow_date || '',
      o.created_at || '',
      o.paper_lot || '',
      o.supplier_name || '',
      o.paper_type || '',
      o.width_mm || '',
      o.weight_kg || '',
      o.voided ? 'VOIDED' : 'ACTIVE'
    ]);
  });
  
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `paper-out-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

async function loadTabBadge() {
  const today = new Date().toISOString().split('T')[0];
  const { count } = await supabase
    .from('paper_outflows')
    .select('*', { count: 'exact', head: true })
    .eq('outflow_date', today)
    .eq('voided', false);
  
  const badge = document.getElementById('tabBadge');
  if (count > 0) {
    badge.textContent = `(${count})`;
    badge.style.fontSize = '12px';
    badge.style.opacity = '0.7';
  } else {
    badge.textContent = '';
  }
}

let scanStream = null;
let scanRAF = null;

document.getElementById('btnScan').addEventListener('click', startScanner);

async function startScanner() {
  const modal = document.getElementById('modalScanner');
  const video = document.getElementById('scannerVideo');
  
  try {
    scanStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    video.srcObject = scanStream;
    modal.classList.add('show');
    await video.play();
    scanLoop(video);
  } catch (err) {
    showToast('❌ ไม่สามารถเปิดกล้อง: ' + err.message, 'error');
  }
}

function scanLoop(video) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  
  function tick() {
    if (!scanStream) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);
      if (code && code.data) {
        const parts = code.data.split('_');
        const lot = parts.length >= 5 ? parts[parts.length - 1] : code.data;
        document.getElementById('lotInput').value = lot.toUpperCase();
        doLookup(normalize(lot));
        stopScanner();
        showToast('✓ Scan สำเร็จ: ' + lot, 'success');
        return;
      }
    }
    scanRAF = requestAnimationFrame(tick);
  }
  tick();
}

window.stopScanner = function() {
  if (scanRAF) cancelAnimationFrame(scanRAF);
  if (scanStream) {
    scanStream.getTracks().forEach(t => t.stop());
    scanStream = null;
  }
  document.getElementById('modalScanner').classList.remove('show');
};

loadTabBadge();
lotInput.focus();
</script>
